<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ao Vivo - SmartBox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="pwa/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="pwa/icon-192.png">
</head>
<body>

  <header class="topbar">
    <div class="logo">SMARTBOX</div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Início</a>
      <a href="ao-vivo.html">Ao Vivo</a>
      <a href="youtube.html">YouTube</a>
    </nav>
    <div class="header-right">
      <div class="user-box">
        <span id="usuarioNome"></span>
        <button id="btnSair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Canais ao vivo</h1>

    <!--
      Os cards dos canais são criados automaticamente pelo script.js
      a partir da lista catalogo.aoVivo que está no data.js
      Para adicionar um canal: vá no data.js e adicione um item em aoVivo[]
    -->
    <div id="canaisGrid" class="poster-row"></div>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script src="pwa/register-sw.js"></script>
</body>
</html>
