<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mangás - Tvxbox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="pwa/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="pwa/icon-192.png">
  <style>
    /* ── Leitor de mangá ── */
    .manga-reader-overlay {
      position: fixed; inset: 0; background: #0a0a0a;
      z-index: 500; display: none; flex-direction: column;
    }
    .manga-reader-overlay.ativo { display: flex; }

    .manga-reader-topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px; background: rgba(17,17,17,.97);
      border-bottom: 1px solid #222; flex-shrink: 0;
    }
    .manga-reader-topbar h2 { flex: 1; font-size: 16px; color: #fff; }
    .manga-reader-topbar button {
      background: #222; border: 1px solid #333; color: #fff;
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    }
    .manga-reader-topbar button:hover { background: #2f2f2f; }
    .manga-reader-topbar .btn-fechar {
      background: #e50914; border-color: #e50914; font-weight: bold;
    }

    .manga-reader-body {
      flex: 1; overflow-y: auto; display: flex;
      justify-content: center; padding: 20px 16px;
      scroll-behavior: smooth;
    }

    .manga-reader-body iframe {
      width: 100%; max-width: 900px; height: calc(100vh - 80px);
      border: none; border-radius: 10px; background: #fff;
    }

    /* Capítulos grid na página de mangá */
    .capitulos-grid {
      display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;
    }
    .capitulo-card {
      background: #1f1f1f; border-radius: 12px; padding: 14px 18px;
      cursor: pointer; transition: background .2s; min-width: 140px;
      border: 1px solid #2a2a2a;
    }
    .capitulo-card:hover { background: #2b2b2b; border-color: #e50914; }
    .capitulo-card h3 { font-size: 15px; margin-bottom: 4px; }
    .capitulo-card p  { font-size: 12px; color: #999; }
    .capitulo-card .cap-lido { font-size: 11px; color: #4caf50; margin-top: 6px; }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="logo">TVXBOX</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Início</a>
      <a href="ao-vivo.html">Ao Vivo</a>
      <a href="mangas.html">Mangás</a>
      <a href="aulas.html">Aulas</a>
    </nav>
    <div class="header-right">
      <div class="user-box">
        <span id="usuarioNome"></span>
        <button id="btnSair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title" style="margin-bottom:24px">Mangás</h1>

    <!-- Grid de mangás (cards de capa) -->
    <div id="rowMangas" class="poster-row"></div>

    <!-- Painel de capítulos — aparece ao selecionar um mangá -->
    <section id="capitulosBox" class="hidden" style="margin-top:32px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px">
        <button id="btnVoltarMangas" style="
          background:#222;border:1px solid #333;color:#fff;
          padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;
        ">← Voltar</button>
        <h2 id="mangaSelecionadoTitulo" style="font-size:22px"></h2>
      </div>
      <div id="capitulosGrid" class="capitulos-grid"></div>
    </section>
  </main>

  <!-- Leitor de PDF fullscreen -->
  <div class="manga-reader-overlay" id="mangaReaderOverlay">
    <div class="manga-reader-topbar">
      <h2 id="readerTitulo">Lendo...</h2>
      <button id="btnReaderFechar" class="btn-fechar">✕ Fechar</button>
    </div>
    <div class="manga-reader-body">
      <iframe id="readerFrame" title="Leitor de mangá"></iframe>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script src="pwa/register-sw.js"></script>
</body>
</html>
