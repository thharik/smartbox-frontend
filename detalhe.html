<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe - Tvxbox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="pwa/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="pwa/icon-192.png">
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="logo">TVXBOX</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Início</a>
      <a href="ao-vivo.html">Ao Vivo</a>
      <a href="mangas.html">Mangás</a>
      <a href="aulas.html">Aulas</a>
    </nav>
    <div class="header-right">
      <div class="user-box">
        <span id="usuarioNome"></span>
        <button id="btnSair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">

    <section id="detalheConteudo" class="detalhe-box"></section>

    <section class="detalhe-acoes" id="detalheAcoes">
      <button id="btnAssistirDetalhe" class="btn-detalhe btn-play" type="button">
        ▶ Assistir
      </button>
      <button id="btnFavoritoDetalhe" class="btn-detalhe btn-fav" type="button">
        + Minha lista
      </button>
    </section>

    <section class="temporada-box" id="temporadaBox">
      <label for="temporadaSelect">Temporada:</label>
      <select id="temporadaSelect"></select>
    </section>

    <section>
      <div class="section-header"><h2>Episódios</h2></div>
      <div id="episodiosGrid" class="episodios-grid"></div>
    </section>

  </main>

  <script src="script.js"></script>
  <script src="pwa/register-sw.js"></script>
</body>
</html>
